name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: tongji-code-linux-x64-gnu
            binary: tongji-code-cli
          - os: macos-14
            target: x86_64-apple-darwin
            asset: tongji-code-darwin-x64
            binary: tongji-code-cli
          - os: macos-14
            target: aarch64-apple-darwin
            asset: tongji-code-darwin-arm64
            binary: tongji-code-cli
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: tongji-code-win32-x64-msvc.exe
            binary: tongji-code-cli.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        working-directory: rust
        run: cargo build --release -p tongji-code-cli --target ${{ matrix.target }}

      - name: Prepare asset
        shell: bash
        run: |
          mkdir -p dist
          cp "rust/target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.asset }}"

      - name: Upload GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset }}
          fail_on_unmatched_files: true
